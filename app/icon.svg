<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- Dark background matching nav -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>

  <!-- OS in white, Syne 800 -->
  <text x="2" y="24"
    font-family="'Syne', 'Space Grotesk', system-ui, sans-serif"
    font-size="17"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-0.8">OS</text>

  <!-- Green dot -->
  <text x="25.5" y="24"
    font-family="'Syne', system-ui, sans-serif"
    font-size="17"
    font-weight="800"
    fill="#3dba7e">.</text>
</svg>
